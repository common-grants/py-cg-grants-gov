name: "CD - Publish to PyPI"

on:
  workflow_call:
    inputs:
      tag:
        description: "Git tag to publish (e.g., v0.1.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g., v0.1.0)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cg-grants-gov
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: Gr1N/setup-poetry@v9

      - name: Build package
        run: poetry build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
